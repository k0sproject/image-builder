name: Build
on:
  push:
    branches:
      - main
    paths:
      - images/**
      - .github/workflows/build.yml
  pull_request:
    paths:
      - images/**
      - .github/workflows/build.yml
jobs:
  prepare:
    name: Generate matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.gen-matrix.outputs.matrix }}
    steps:
      - name: Generate build matrix
        id: gen-matrix
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: "${{ github.repository }}"
        run: |
          set -euo pipefail

          queryTrees() {
            gh api -X GET "repos/{owner}/{repo}/git/trees/$1" -F recursive=1 -q '
              (
                .tree
                | map({key: .path, value: .sha})
                | from_entries
              ) as $paths
              | .tree
              | map(select(.type == "blob"))
              | map(.path | split("/"))
              | map(select(length == 4 and .[0] == "images" and .[3] == "Dockerfile"))
              | map(.[0:3] | join("/"))
              | map({key: ., value: $paths[.]})
              | from_entries
            '
          }

          oldTrees=$(queryTrees "${GITHUB_BASE_REF:-$GITHUB_SHA^1}") || {
            exitCode=$?
            echo Failed to query old trees from "${GITHUB_BASE_REF:-$GITHUB_SHA^1}" >&2
            exit $exitCode
          }

          newTrees=$(queryTrees "$GITHUB_SHA") || {
            exitCode=$?
            echo Failed to query new trees from "$GITHUB_SHA" >&2
            exit $exitCode
          }

          OLD_TREES=$oldTrees NEW_TREES=$newTrees jq -r -n '
            ($ENV.OLD_TREES | fromjson) as $old
            | $ENV.NEW_TREES
            | fromjson
            | to_entries
            | map(select(.value != $old[.key]))
            | map(.key | split("/") | .[1:] | join("/"))
            | if length > 0 then {folder: .} else {skip: 1} end # hack to skip an empty matrix (GitHub will fail on empty matrix builds)
            | "matrix=\(tojson)"
          ' | tee -- "$GITHUB_OUTPUT"

  images:
    runs-on: ubuntu-22.04
    needs: [prepare]
    if: needs.prepare.outputs.matrix != '{"skip":1}'
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Determine image parameters
        id: image
        env:
          FOLDER: ${{ matrix.folder }}
        run: |
          set -euo pipefail

          registry=ttl.sh
          name="$GITHUB_REPOSITORY_OWNER-${FOLDER%%/*}-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          tag=1d

          if [ "$GITHUB_REPOSITORY_OWNER" = k0sproject ] && [ "$GITHUB_REF" = refs/heads/main ]; then
            registry=quay.io
            name="$GITHUB_REPOSITORY_OWNER/${FOLDER%%/*}"
            tag="${FOLDER#*/}"
          fi

          defaultPlatforms=(linux/amd64 linux/arm64 linux/arm/v7 linux/riscv64)

          case "$FOLDER" in
          envoy*) unsupportedPlatforms=(linux/arm/v7 linux/riscv64) ;;
          actions-runner*) unsupportedPlatforms=(linux/riscv64) ;;
          traefik*) defaultPlatforms+=(windows/amd64) ;;
          *) unsupportedPlatforms=() ;;
          esac

          case "$FOLDER" in
          apiserver-network-proxy*) includeWindows=true ;;
          *) includeWindows= ;;
          esac

          buildPlatforms=()
          for p in "${defaultPlatforms[@]}"; do
            skip=0
            for up in "${unsupportedPlatforms[@]}"; do
              if [ "$p" = "$up" ]; then
                skip=1
                break
              fi
            done
            [ $skip -ne 0 ] || buildPlatforms+=("$p")
          done

          # Don't forget to adjust the upload-sarif job when changing this.
          trivyResults="${FOLDER//\//-}-trivy.sarif"

          {
            echo "image-name=$registry/$name:$tag"
            echo "platforms=$(IFS=',';  echo "${buildPlatforms[*]}")"
            echo "trivy-results=$trivyResults"
            echo "include-windows=$includeWindows"
          } | tee -- "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          show-progress: false

      - name: Determine SOURCE_DATE_EPOCH
        run: |
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" >>"$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: ${{ steps.image.outputs.platforms }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          buildkitd-config-inline: |
            [worker.oci]
              # When too many workers are running, it can actually freeze the builder.
              max-parallelism = 4

      - name: Collect additional build contexts
        id: build-contexts
        env:
          FOLDER: ${{ matrix.folder }}
        run: |
          set -euo pipefail
          if [ -d images/"$FOLDER"/build-contexts ]; then
            for ctx in images/"$FOLDER"/build-contexts/*; do
              printf '%s=%s\n' "${ctx##*/}" "$ctx"
            done
          fi \
            | jq --slurp --raw-input --raw-output \
              'rtrimstr("\n") | split("\n") | "list=\(tojson)"' \
            | tee -- "$GITHUB_OUTPUT"

      - name: Build - Multi-platform
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ format('images/{0}', matrix.folder) }}
          build-contexts: ${{ join(fromJSON(steps.build-contexts.outputs.list), '\n') }}
          platforms: ${{ steps.image.outputs.platforms }}
          outputs: type=oci,dest=image.tar,rewrite-timestamp=true

      - name: Build - Windows 2019
        if: steps.image.outputs.include-windows != ''
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ format('images/{0}', matrix.folder) }}
          build-contexts: ${{ join(fromJSON(steps.build-contexts.outputs.list), '\n') }}
          platforms: windows/amd64
          build-args: WINDOWS_VERSION=2019
          outputs: type=oci,dest=windows-2019.tar,rewrite-timestamp=true

      - name: Build - Windows 2022
        if: steps.image.outputs.include-windows != ''
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ format('images/{0}', matrix.folder) }}
          build-contexts: ${{ join(fromJSON(steps.build-contexts.outputs.list), '\n') }}
          platforms: windows/amd64
          build-args: WINDOWS_VERSION=2022
          outputs: type=oci,dest=windows-2022.tar,rewrite-timestamp=true

      - name: Build - Windows 2025
        if: steps.image.outputs.include-windows != ''
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ format('images/{0}', matrix.folder) }}
          build-contexts: ${{ join(fromJSON(steps.build-contexts.outputs.list), '\n') }}
          platforms: windows/amd64
          build-args: WINDOWS_VERSION=2025
          outputs: type=oci,dest=windows-2025.tar,rewrite-timestamp=true

      - name: Combine images
        id: combine
        if: steps.image.outputs.include-windows != ''
        run: |
          digest=$(./index-append.sh combined image.tar windows-20{19,22,25}.tar)
          tar cf combined.tar -C combined \
            --sort=name \
            --mtime=@0 \
            --owner=0 --group=0 --numeric-owner \
            --pax-option=exthdr.name=%d/PaxHeaders/%f,delete=atime,delete=ctime \
            blobs/ index.json oci-layout
          mv combined.tar image.tar
          rm windows-20{19,22,25}.tar
          rm -rf combined
          echo "digest=$digest" | tee -- "$GITHUB_OUTPUT"

      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - name: Login to Quay
        if: startsWith(steps.image.outputs.image-name, 'quay.io/')
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}
          registry: quay.io

      - name: Push image
        env:
          IMAGE_NAME: "${{ steps.image.outputs.image-name }}"
          DIGEST: "${{ steps.combine.outputs.digest || steps.build.outputs.digest }}"
        run: oras cp -r --from-oci-layout -- image.tar@"$DIGEST" "$IMAGE_NAME"

      - name: Run Trivy vulnerability
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image-name }}
          ignore-unfixed: true
          format: sarif
          severity: CRITICAL,HIGH
          output: ${{ steps.image.outputs.trivy-results }}

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.image.outputs.trivy-results }}
          path: ${{ steps.image.outputs.trivy-results }}

  upload-sarif:
    runs-on: ubuntu-22.04
    needs: [prepare, images]
    if: github.event_name == 'push' && needs.prepare.outputs.matrix != '{"skip":1}'
    permissions:
      security-events: write
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Prepare
        id: prepare
        env:
          FOLDER: ${{ matrix.folder }}
        run: |
          set -euo pipefail
          echo "sarif-file=${FOLDER//\//-}-trivy.sarif" | tee -- "$GITHUB_OUTPUT"

      - name: Download Trivy scan results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.prepare.outputs.sarif-file }}

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.prepare.outputs.sarif-file }}
